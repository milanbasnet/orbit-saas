services:

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: orbit_backend
    working_dir: /var/www
    user: "www-data"
    volumes:
      - ./backend:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - orbit_network

  nginx:
    image: nginx:latest
    container_name: orbit_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - orbit_network

  mysql:
    image: mysql:8
    container_name: orbit_mysql
    environment:
      MYSQL_DATABASE: orbit
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - orbit_network

  redis:
    image: redis:latest
    container_name: orbit_redis
    ports:
      - "6379:6379"
    networks:
      - orbit_network

  frontend:
    image: node:20
    container_name: orbit_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - orbit_network

volumes:
  mysql_data:

networks:
  orbit_network:
    driver: bridge